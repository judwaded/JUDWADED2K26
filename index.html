<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDWADED 2K26 - SONGKRAN EDITION</title>
    <link rel="icon" type="image/x-icon" href="Logo_JUDWADED.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@900&family=Rajdhani:wght@500&family=Prompt:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* โทนสีสงกรานต์: ฟ้าคราม และเหลืองดินสอพอง */
            --bg-gradient: linear-gradient(135deg, #00b4db, #0083b0);
            --text-color: #ffffff;
            --sub-text: #e0f7fa;
            --bar-bg: rgba(255, 255, 255, 0.2);
            --bar-border: rgba(255, 255, 255, 0.4);
            --accent-color: #ffeb3b; 
            --water-color: #ffffff;
        }

        body {
            background: var(--bg-gradient);
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            min-height: 100vh;
            font-family: 'Prompt', 'Inter', sans-serif;
            color: var(--text-color);
            overflow-x: hidden; 
        }

        /* เอฟเฟกต์หยดน้ำร่วงลงมา */
        #water-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .drop { position: absolute; top: -50px; background: rgba(255, 255, 255, 0.6); border-radius: 0 50% 50% 50%; transform: rotate(45deg); animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(0) rotate(45deg); opacity: 0.7; } 100% { transform: translateY(110vh) rotate(45deg); opacity: 0; } }

        .main-container { 
            max-width: 1800px; 
            margin: 0 auto; 
            padding: 0 20px;
            position: relative; 
            z-index: 10; 
        }

        .content-wrapper {
            display: flex;
            justify-content: space-between; 
            align-items: center;            
            min-height: 100vh;
            width: 100%;
            gap: 40px; 
            padding: 40px 0;
            box-sizing: border-box;
        }

        .header-section { flex: 1; }

        .text-brand { font-family: 'Orbitron', sans-serif; font-size: clamp(40px, 8vw, 85px); font-weight: 900; margin: 0; letter-spacing: -2px; line-height: 0.9; text-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
        .text-year { font-family: 'Orbitron', sans-serif; font-size: clamp(30px, 6vw, 70px); font-weight: 900; margin: 0; line-height: 0.9; color: var(--accent-color); }
        .status-bar { margin-top: 15px; font-family: 'Rajdhani', sans-serif; color: var(--sub-text); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; background: rgba(0,0,0,0.1); display: inline-block; padding: 5px 15px; border-radius: 20px; }

        /* กล่องกลาง */
        .center-box {
            width: 100%;
            max-width: 600px; 
            background: var(--bar-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--bar-border);
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            padding: 40px;
            box-sizing: border-box;
        }

        /* การจัดการปุ่มให้เท่ากันเป๊ะ */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px; 
            width: 100%;
        }

        .top-row {
            display: flex;
            gap: 15px; 
            width: 100%;
        }

        .bottom-row {
            width: 100%;
        }

        .btn {
            background: #ffffff;
            border: none;
            color: #0083b0;
            padding: 18px 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
            flex: 1; /* บังคับให้ปุ่มในแถวเดียวกันกว้างเท่ากัน */
        }

        .btn:hover {
            background: var(--accent-color);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* ปุ่มแถวล่าง (สีชมพู) */
        .btn-large {
            width: 100%;
            background: #ff4081; 
            color: white;
            margin-top: 5px;
        }

        @media (max-width: 1100px) { 
            .content-wrapper { flex-direction: column; text-align: center; justify-content: center; }
            .header-section { margin-bottom: 30px; }
            .center-box { padding: 30px 20px; }
        }

        @media (max-width: 480px) {
            .top-row { flex-direction: column; } /* บนมือถือให้ปุ่มเรียงแถวเดี่ยว */
            .text-brand { font-size: 50px; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="FOXX.mp3" type="audio/mpeg">
    </audio>

    <div id="water-container"></div>

    <div class="main-container">
        <div class="content-wrapper">
            
            <header class="header-section">
                <h1 class="text-brand">SONGKRAN</h1>
                <h2 class="text-year">JUDWADED 2K26</h2>
                <div class="status-bar">💦 HAPPY SONGKRAN FESTIVAL 💦</div>
            </header>

            <div class="center-box">
                <div class="button-group">
                    <div class="top-row">
                        <a href="judwaded.html" class="btn">JUDWADED</a>
                        <a href="#" class="btn">WAIRAIBXY</a>
                    </div>
                    <div class="bottom-row">
                        <a href="watjaistyle.html" class="btn btn-large">WATJAISTYLE</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        audio.volume = 0.5; 

        function startMusic() {
            audio.play().catch(e => console.log("Audio play blocked"));
            document.removeEventListener('click', startMusic);
            document.removeEventListener('touchstart', startMusic);
        }

        document.addEventListener('click', startMusic);
        document.addEventListener('touchstart', startMusic);

        // สร้างหยดน้ำร่วงลงมา
        function createDrops() {
            const container = document.getElementById('water-container');
            for (let i = 0; i < 35; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                const size = Math.random() * 7 + 3 + 'px';
                drop.style.width = size;
                drop.style.height = size;
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = Math.random() * 2 + 1.5 + 's';
                drop.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(drop);
            }
        }
        createDrops();
    </script>
</body>
</html>
